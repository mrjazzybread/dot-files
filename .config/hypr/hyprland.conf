################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,preferred,auto,1
monitor=HDMI-A-1,preferred,auto-up,1
#monitor=eDP-1,preferred,auto-up,1,mirror,HDMI-A-1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
#$fileManager = dolphin
$menu = wofi --show drun --allow-images

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

#Wallpaper Daemon
exec-once = wpaperd
#Waybar
exec-once = waybar
#Battery notifications
exec-once = cbatticon
#Update config files
exec-once = ~/.update.sh
# Network manager applet
exec-once = nm-applet
# Removes all files that have been in the trash folder for more than 30 days
exec-once = trash-empty 30
# Start discord
exec-once = discord --start-minimized
# Start slack
exec-once = slack --startup
# Makes it so the screen in locked on suspensions
exec-once = xss-lock -- hyprlock
# Auto mount usb drives
exec-once = udiskie
# Starts music player daemon
exec-once = mpd
# Enables mpd to be used with playerctl
exec-once = mpd-mpris -port 6601
# Script to autopause media when headphones are disconnected
exec-once = ~/.config/autopause.sh
# Notification daemon
exec-once = dunst
# Enable notifications for mpd
exec-once = musnify-mpd
#Emacs daemon
exec-once = emacs --daemon

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# (https://wiki.hyprland.org/Configuring/Environment-variables/)
# (https://github.com/swaywm/wlroots/blob/master/docs/env_vars.md)
# (https://www.reddit.com/r/hyprland/comments/17j12jz/finally_got_xwayland_on_nvidia_working_perfectly/)
#
 
cursor {
    no_hardware_cursors = true
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 5

    border_size = 4

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(3b0073)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windowsOut, 1, 7, default, popin 80%
    animation = windowsIn, 1, 5, default, slide left
    animation = windowsMove, 1, 5, default, slide right
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
    no_gaps_when_only= true

    always_center_master=true
    mfact=0.6
    new_on_top=true
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = pt
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

env = GDK_BACKEND,wayland,x11,*
####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

#Keybindings to startup common applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, emacs --daemon
bind = $mainMod, N, exec, pavucontrol
bind = $mainMod, M, exec, $terminal -e ncmpcpp
bind = $mainMod, C, killactive,
bind = $mainMod, R, exit,
bind = $mainMod, E, exec, emacsclient -nc
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, Return, exec, vivaldi
bind = $mainMod, ESCAPE, exec, systemctl suspend
bind = ,XF86Calculator, exec, deepin-calculator

# Run work playlist
bind = $mainMod, W, exec, ~/.config/work.sh

# Fullscreen
bind = $mainMod, F, fullscreen

# Brightness controll
bind =, XF86MonBrightnessDown, exec, backlight_control -10
bind =, XF86MonBrightnessUp, exec, backlight_control +10
# Media player controls
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioPrev, exec, playerctl previous
bind =, XF86AudioNext, exec, playerctl next
# Volume Control
binde =, XF86AudioRaiseVolume, exec, amixer -D pulse sset Master 5%+ && play -v .2 ~/.config/vol.mp3
binde =, XF86AudioLowerVolume, exec, amixer -D pulse sset Master 5%- && play -v .2 ~/.config/vol.mp3
bind =, XF86AudioMute, exec, amixer -D amixer -D pulse set Master 1+ toggle

# Move focus with mainMod + arrow keys
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, l
bind = $mainMod, I, movefocus, u
bind = $mainMod, K, movefocus, d
bind = ,Print, exec, grimshot save area

# Move focused windows
bind = SUPER SHIFT, J, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, d
bind = SUPER SHIFT, I, movewindow, u

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

